<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitts' Law Task</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- TOPページ -->
  <div id="screen-top" class="screen active">
    <div class="top-container">
      <h1>Fitts' Law Task</h1>
      <p class="subtitle">フィッツの法則を体験する実験課題</p>

      <div class="form-group">
        <label for="input-id">学籍番号</label>
        <input type="text" id="input-id" placeholder="例: 2024A001" autocomplete="off">
      </div>

      <div class="form-group">
        <label>クリック回数</label>
        <div class="chip-group single" data-param="clicks">
          <button class="chip" data-value="10">10</button>
          <button class="chip selected" data-value="20">20</button>
          <button class="chip" data-value="30">30</button>
          <button class="chip" data-value="50">50</button>
        </div>
      </div>

      <p class="note">2つの円を交互にクリックしてください。<br>円の外をクリックするとミスとして記録されます。</p>

      <button id="btn-start" class="btn-primary">実験開始</button>
    </div>
  </div>

  <!-- 実験画面 -->
  <div id="screen-experiment" class="screen">
    <div class="experiment-hud">
      <span id="hud-progress">0 / 20</span>
      <span id="hud-miss">ミス: 0</span>
    </div>
    <canvas id="canvas"></canvas>
    <div id="experiment-msg" class="experiment-msg"></div>
  </div>

  <!-- 結果画面 -->
  <div id="screen-results" class="screen">
    <div class="results-container">
      <h1>実験結果</h1>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">学籍番号</div>
          <div class="stat-value stat-value-sm" id="stat-student-id">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">ミス回数</div>
          <div class="stat-value" id="stat-miss">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">所要時間</div>
          <div class="stat-value" id="stat-time">—</div>
        </div>
      </div>

      <div class="results-actions">
        <button id="btn-csv" class="btn-secondary">CSVダウンロード</button>
        <button id="btn-retry" class="btn-primary">もう一度</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
